name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Build Docker image
      run: |
        docker build -t songping19911217/openclaw:local -f openclaw/Dockerfile .
        docker push songping19911217/openclaw:local
